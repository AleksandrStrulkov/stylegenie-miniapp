# Публикация Mini App (/terms, /privacy) и docs/documents/public_offer.txt на GitHub Pages.
# В репозитории: Settings → Pages → Source: GitHub Actions.
name: Deploy legal docs to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "miniapp/legal/**"
      - ".github/workflows/github-pages-legal.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-legal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # В репозитории только docs/ (без miniapp/ в корне) — шаг пропускается.
      - name: Sync miniapp HTML into docs (if present)
        run: |
          if [ -f miniapp/legal/index.html ]; then
            mkdir -p docs/miniapp/legal
            cp -f miniapp/legal/index.html docs/miniapp/legal/index.html
            echo "Synced from miniapp/legal/index.html"
          else
            echo "No miniapp/legal/index.html in repo root — using docs/miniapp/legal/index.html as-is"
          fi
          test -f docs/miniapp/legal/index.html || (echo "Missing docs/miniapp/legal/index.html" && exit 1)
          test -f docs/documents/public_offer.txt || (echo "Missing docs/documents/public_offer.txt" && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
