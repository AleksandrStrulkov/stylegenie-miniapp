<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Условия сервиса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --link: var(--tg-theme-link-color, #2481cc);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      font-size: 15px;
      padding: 12px 16px calc(24px + env(safe-area-inset-bottom, 0));
    }
    #title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 16px;
      line-height: 1.4;
    }
    #title .doc-subtitle {
      display: block;
      font-weight: 700;
      margin-top: 4px;
    }
    #content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #content.loading { color: var(--hint); }
    #content.error { color: #c0392b; }
    a { color: var(--link); }
  </style>
</head>
<body>
  <h1 id="title" hidden></h1>
  <article id="content" class="loading">Загрузка…</article>
  <script>
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor("secondary_bg_color");
      }

      const params = new URLSearchParams(window.location.search);
      const titleEl = document.getElementById("title");
      const contentEl = document.getElementById("content");

      function parseDocument(text) {
        const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        let i = 0;
        while (i < lines.length && !lines[i].trim()) i++;
        const titleMain = (lines[i++] || "").trim();
        while (i < lines.length && !lines[i].trim()) i++;
        let titleSub = "";
        if (i < lines.length) {
          const candidate = lines[i].trim();
          if (candidate.charAt(0) === "(") {
            titleSub = candidate;
            i++;
          }
        }
        while (i < lines.length && !lines[i].trim()) i++;
        const body = lines.slice(i).join("\n").trim();
        return { titleMain: titleMain, titleSub: titleSub, body: body };
      }

      function renderDocument(text) {
        const parsed = parseDocument(text);
        contentEl.classList.remove("loading", "error");

        if (parsed.titleMain) {
          titleEl.hidden = false;
          titleEl.textContent = "";
          titleEl.appendChild(document.createTextNode(parsed.titleMain));
          if (parsed.titleSub) {
            const sub = document.createElement("span");
            sub.className = "doc-subtitle";
            sub.textContent = parsed.titleSub;
            titleEl.appendChild(sub);
          }
          document.title = parsed.titleMain;
        } else {
          titleEl.hidden = true;
        }

        contentEl.textContent = parsed.body || "";
      }

      function showError(msg) {
        titleEl.hidden = true;
        contentEl.classList.remove("loading");
        contentEl.classList.add("error");
        contentEl.textContent = msg;
      }

      var docKind = (params.get("doc") || "terms").toLowerCase();
      var DOC_TXT = {
        terms: "../../documents/public_offer.txt",
        privacy: "../../documents/policy_personal.txt",
        consent: "../../documents/consent_personal.txt"
      };

      function githubPagesTxtUrl() {
        const custom = params.get("txt");
        if (custom) {
          return custom + (custom.indexOf("?") >= 0 ? "&" : "?") + "_=" + Date.now();
        }
        var path = DOC_TXT[docKind] || DOC_TXT.terms;
        return path + "?_=" + Date.now();
      }

      function loadFromTxt(url) {
        return fetch(url, { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("txt HTTP " + res.status);
            return res.text();
          })
          .then(renderDocument);
      }

      function loadFromApi() {
        var apiUrl = "/api/legal/document?doc=" + encodeURIComponent(docKind) + "&_=" + Date.now();
        return fetch(apiUrl, { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("api HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            renderDocument(data.body || "");
          });
      }

      var host = window.location.hostname || "";
      var onGithubPages = host.endsWith(".github.io");
      var forcePages = params.get("source") === "pages";

      if (onGithubPages || forcePages) {
        loadFromTxt(githubPagesTxtUrl()).catch(function () {
          showError("Не удалось загрузить документ. Проверьте, что файлы в docs/documents/ опубликованы на GitHub Pages.");
        });
        return;
      }

      loadFromApi().catch(function () {
        loadFromTxt(githubPagesTxtUrl()).catch(function () {
          showError("Не удалось загрузить документ. Попробуйте позже.");
        });
      });
    })();
  </script>
</body>
</html>
