<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Условия сервиса</title>
  <script>
    (function () {
      var doc = (new URLSearchParams(window.location.search).get("doc") || "terms").toLowerCase();
      if (doc === "terms" || doc === "privacy" || doc === "consent") {
        window.location.replace(doc + ".html");
        return;
      }
      window.location.replace("terms.html");
    })();
  </script>
</head>
<body><p>Переход…</p></body>
</html>
