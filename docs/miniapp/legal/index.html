<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Условия сервиса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --link: var(--tg-theme-link-color, #2481cc);
      --border: color-mix(in srgb, var(--text) 12%, transparent);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      padding: 12px 16px calc(28px + env(safe-area-inset-bottom, 0));
    }
    #content.loading { color: var(--hint); }
    #content.error { color: #c0392b; }
    #content.legal-md { white-space: normal; word-wrap: break-word; }
    #content.legal-md :first-child { margin-top: 0; }
    #content.legal-md h1 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 0.5rem;
    }
    #content.legal-md h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 1.35rem 0 0.65rem;
      padding-top: 0.25rem;
      border-top: 1px solid var(--border);
    }
    #content.legal-md h2:first-of-type { border-top: none; padding-top: 0; }
    #content.legal-md h3 {
      font-size: 0.98rem;
      font-weight: 600;
      margin: 1rem 0 0.45rem;
      color: color-mix(in srgb, var(--text) 92%, var(--hint));
    }
    #content.legal-md p { margin: 0.5rem 0 0.75rem; }
    #content.legal-md ul, #content.legal-md ol {
      margin: 0.4rem 0 0.85rem;
      padding-left: 1.25rem;
    }
    #content.legal-md li { margin: 0.35rem 0; }
    #content.legal-md li ul { margin-top: 0.25rem; }
    #content.legal-md strong { font-weight: 700; }
    #content.legal-md em { font-style: italic; color: color-mix(in srgb, var(--text) 88%, var(--hint)); }
    #content.legal-md a { color: var(--link); }
    #content.legal-md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }
    #content.legal-md blockquote {
      margin: 0.75rem 0;
      padding: 0.5rem 0 0.5rem 0.85rem;
      border-left: 3px solid var(--link);
      color: var(--hint);
    }
    #content.legal-md code {
      font-size: 0.9em;
      background: color-mix(in srgb, var(--text) 6%, transparent);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <article id="content" class="loading">Загрузка…</article>
  <script>
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor("secondary_bg_color");
      }

      const params = new URLSearchParams(window.location.search);
      const contentEl = document.getElementById("content");

      marked.setOptions({
        gfm: true,
        breaks: true,
        headerIds: false,
        mangle: false,
      });

      var docKind = (params.get("doc") || "terms").toLowerCase();
      var DOC_FILES = {
        terms: "../../documents/public_offer.md",
        privacy: "../../documents/policy_personal.md",
        consent: "../../documents/consent_personal.md"
      };

      function isMarkdown(text, url) {
        if (/\.md(\?|$)/i.test(url || "")) return true;
        var t = String(text || "").trim();
        return t.indexOf("# ") === 0 || t.indexOf("## ") >= 0;
      }

      function renderPlainText(text) {
        var lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        var i = 0;
        while (i < lines.length && !lines[i].trim()) i++;
        var titleMain = (lines[i++] || "").trim();
        while (i < lines.length && !lines[i].trim()) i++;
        if (i < lines.length && lines[i].trim().charAt(0) === "(") i++;
        while (i < lines.length && !lines[i].trim()) i++;
        var body = lines.slice(i).join("\n").trim();
        contentEl.className = "legal-md";
        var html = "";
        if (titleMain) {
          html += "<h1>" + escapeHtml(titleMain) + "</h1>";
          document.title = titleMain;
        }
        html += "<pre style=\"white-space:pre-wrap;font-family:inherit;margin:0\">" + escapeHtml(body) + "</pre>";
        contentEl.innerHTML = html;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderMarkdown(text) {
        contentEl.classList.remove("loading", "error");
        contentEl.className = "legal-md";
        var raw = marked.parse(String(text || ""));
        contentEl.innerHTML = DOMPurify.sanitize(raw, { USE_PROFILES: { html: true } });
        var h1 = contentEl.querySelector("h1");
        if (h1) document.title = h1.textContent.trim();
      }

      function renderDocument(text, sourceUrl) {
        if (isMarkdown(text, sourceUrl)) {
          renderMarkdown(text);
        } else {
          renderPlainText(text);
        }
      }

      function showError(msg) {
        contentEl.classList.remove("loading");
        contentEl.className = "error";
        contentEl.textContent = msg;
      }

      function documentUrl() {
        var custom = params.get("txt") || params.get("md");
        if (custom) {
          return custom + (custom.indexOf("?") >= 0 ? "&" : "?") + "_=" + Date.now();
        }
        var path = DOC_FILES[docKind] || DOC_FILES.terms;
        return path + "?_=" + Date.now();
      }

      function loadFromFile(url) {
        return fetch(url, { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.text();
          })
          .then(function (text) {
            renderDocument(text, url);
          });
      }

      function loadFromApi() {
        var apiUrl = "/api/legal/document?doc=" + encodeURIComponent(docKind) + "&_=" + Date.now();
        return fetch(apiUrl, { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("api HTTP " + res.status);
            return res.json();
          })
          .then(function (data) {
            renderDocument(data.body || "", data.source_file || "");
          });
      }

      var host = window.location.hostname || "";
      var onGithubPages = host.endsWith(".github.io");
      var forcePages = params.get("source") === "pages";

      if (onGithubPages || forcePages) {
        loadFromFile(documentUrl()).catch(function () {
          showError("Не удалось загрузить документ. Проверьте, что файлы .md в docs/documents/ опубликованы на GitHub Pages.");
        });
        return;
      }

      loadFromApi().catch(function () {
        loadFromFile(documentUrl()).catch(function () {
          showError("Не удалось загрузить документ. Попробуйте позже.");
        });
      });
    })();
  </script>
</body>
</html>
