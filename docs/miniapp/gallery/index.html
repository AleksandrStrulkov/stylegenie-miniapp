<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Галерея работ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f12);
      --card: var(--tg-theme-secondary-bg-color, #1a1a22);
      --text: var(--tg-theme-text-color, #f4f4f5);
      --hint: var(--tg-theme-hint-color, #a1a1aa);
      --accent: var(--tg-theme-button-color, #7c5cff);
      --accent-text: var(--tg-theme-button-text-color, #fff);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px calc(28px + env(safe-area-inset-bottom, 0));
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 4px;
    }
    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.65rem;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--hint);
      font-size: 0.9rem;
      line-height: 1.45;
      max-width: 320px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .compare {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .compare img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.45s ease, transform 0.5s ease;
    }
    .compare .before { z-index: 1; }
    .compare .after {
      z-index: 2;
      opacity: 0;
    }
    .compare:hover .after,
    .compare:focus-within .after,
    .compare.is-after .after {
      opacity: 1;
    }
    .compare:hover .before,
    .compare.is-after .before {
      transform: scale(1.03);
    }
    .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 5;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s;
    }
    .compare.is-after .badge-before,
    .compare:hover .badge-before { opacity: 0; }
    .badge-after {
      left: auto;
      right: 8px;
      opacity: 0;
      background: var(--accent);
    }
    .compare.is-after .badge-after,
    .compare:hover .badge-after { opacity: 1; }
    .hint-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      padding: 28px 8px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      font-size: 0.7rem;
      color: rgba(255,255,255,0.9);
      text-align: center;
      pointer-events: none;
    }
    .card figcaption {
      padding: 10px 10px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card figcaption span {
      display: block;
      font-weight: 400;
      color: var(--hint);
      font-size: 0.72rem;
      margin-top: 2px;
    }
    footer {
      margin-top: 22px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--hint);
    }
  </style>
</head>
<body>
  <header>
    <h1>Галерея работ</h1>
    <p class="subtitle">Наведи или нажми на карточку — увидишь преображение «До» и «После»</p>
  </header>

  <div class="grid" id="gallery"></div>

  <footer>Примеры стилей StyleGenie AI · замените фото в <code>gallery/index.html</code></footer>

  <script>
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor("secondary_bg_color");
      }

      const items = [
        {
          title: "Обложка журнала",
          style: "Editorial glamour",
          before: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=600&q=80",
          after: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600&q=80",
        },
        {
          title: "Студийная лёгкость",
          style: "High-key portrait",
          before: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80",
          after: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600&q=80",
        },
        {
          title: "Неоновый город",
          style: "Cyberpunk vibe",
          before: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600&q=80",
          after: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600&q=80",
        },
        {
          title: "Винтаж",
          style: "Film aesthetic",
          before: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=600&q=80",
          after: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&q=80",
        },
        {
          title: "Деловой стиль",
          style: "Business portrait",
          before: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=600&q=80",
          after: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=600&q=80",
        },
        {
          title: "Мечтательный свет",
          style: "Soft dreamlight",
          before: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600&q=80",
          after: "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=600&q=80",
        },
      ];

      const grid = document.getElementById("gallery");
      items.forEach(function (item) {
        const card = document.createElement("figure");
        card.className = "card";
        const compare = document.createElement("div");
        compare.className = "compare";
        compare.setAttribute("tabindex", "0");
        compare.innerHTML =
          '<span class="badge badge-before">До</span>' +
          '<span class="badge badge-after">После</span>' +
          '<img class="before" alt="До" loading="lazy" src="' + item.before + '">' +
          '<img class="after" alt="После" loading="lazy" src="' + item.after + '">' +
          '<div class="hint-bar">тап · удержание</div>';
        compare.addEventListener("click", function () {
          compare.classList.toggle("is-after");
        });
        const cap = document.createElement("figcaption");
        cap.innerHTML = item.title + "<span>" + item.style + "</span>";
        card.appendChild(compare);
        card.appendChild(cap);
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
