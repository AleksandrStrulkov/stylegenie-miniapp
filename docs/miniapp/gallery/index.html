<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Галерея работ</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f12);
      --card: var(--tg-theme-secondary-bg-color, #1a1a22);
      --text: var(--tg-theme-text-color, #f4f4f5);
      --hint: var(--tg-theme-hint-color, #a1a1aa);
      --accent: var(--tg-theme-button-color, #7c5cff);
      --accent-text: var(--tg-theme-button-text-color, #fff);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px calc(28px + env(safe-area-inset-bottom, 0));
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0 0 8px;
    }
    .subtitle {
      color: var(--hint);
      font-size: 0.88rem;
      line-height: 1.45;
      max-width: 340px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
    }
    .compare {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #111118;
    }
    .compare img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.35s ease;
    }
    .compare .before { z-index: 1; opacity: 1; }
    .compare .after { z-index: 2; opacity: 0; }
    .compare.show-after .before { opacity: 0; }
    .compare.show-after .after { opacity: 1; }
    .toggle {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      gap: 4px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
    }
    .toggle button {
      border: 0;
      margin: 0;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle button.is-active {
      background: var(--accent);
      color: var(--accent-text);
    }
    .card figcaption {
      padding: 10px 10px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card figcaption span {
      display: block;
      font-weight: 400;
      color: var(--hint);
      font-size: 0.72rem;
      margin-top: 2px;
    }
    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.76rem;
      color: var(--hint);
    }
    @media (hover: hover) and (pointer: fine) {
      .compare:hover .before { opacity: 0; }
      .compare:hover .after { opacity: 1; }
      .compare.show-after:hover .before { opacity: 0; }
    }
  </style>
</head>
<body>
  <p style="margin:0 0 12px"><a href="../dashboard/index.html" style="color:#a1a1aa;text-decoration:none">← Дашборд</a></p>
  <header>
    <h1>Галерея работ</h1>
    <p class="subtitle">Нажми «До» или «После» на карточке, чтобы сравнить результат</p>
  </header>

  <div class="grid" id="gallery"></div>

  <footer>StyleGenie AI · фото в папке <code>miniapp/gallery/images/</code></footer>

  <script>
    (function () {
      try {
        if (window.WebApp && typeof window.WebApp.ready === "function") {
          window.WebApp.ready();
        }
      } catch (e) { /* ignore */ }
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor("secondary_bg_color");
      }

      const base = new URL(".", window.location.href).href;

      function imgUrl(path) {
        return new URL(path, base).href;
      }

      const items = [
        { title: "Обложка журнала", style: "Editorial glamour", before: "images/01-before.jpg", after: "images/01-after.jpg" },
        { title: "Студийная лёгкость", style: "High-key portrait", before: "images/02-before.jpg", after: "images/02-after.jpg" },
        { title: "Неоновый город", style: "Cyberpunk vibe", before: "images/03-before.jpg", after: "images/03-after.jpg" },
        { title: "Винтаж", style: "Film aesthetic", before: "images/04-before.jpg", after: "images/04-after.jpg" },
        { title: "Деловой стиль", style: "Business portrait", before: "images/05-before.jpg", after: "images/05-after.jpg" },
        { title: "Мечтательный свет", style: "Soft dreamlight", before: "images/06-before.jpg", after: "images/06-after.jpg" },
      ];

      function setMode(compare, mode) {
        const showAfter = mode === "after";
        compare.classList.toggle("show-after", showAfter);
        const btnBefore = compare.querySelector('[data-mode="before"]');
        const btnAfter = compare.querySelector('[data-mode="after"]');
        if (btnBefore) btnBefore.classList.toggle("is-active", !showAfter);
        if (btnAfter) btnAfter.classList.toggle("is-active", showAfter);
      }

      const grid = document.getElementById("gallery");
      items.forEach(function (item) {
        const card = document.createElement("figure");
        card.className = "card";

        const compare = document.createElement("div");
        compare.className = "compare";

        const imgBefore = document.createElement("img");
        imgBefore.className = "before";
        imgBefore.alt = "До";
        imgBefore.loading = "lazy";
        imgBefore.decoding = "async";
        imgBefore.src = imgUrl(item.before);

        const imgAfter = document.createElement("img");
        imgAfter.className = "after";
        imgAfter.alt = "После";
        imgAfter.loading = "lazy";
        imgAfter.decoding = "async";
        imgAfter.src = imgUrl(item.after);

        const toggle = document.createElement("div");
        toggle.className = "toggle";
        toggle.innerHTML =
          '<button type="button" data-mode="before" class="is-active">До</button>' +
          '<button type="button" data-mode="after">После</button>';

        toggle.addEventListener("click", function (e) {
          const btn = e.target.closest("button[data-mode]");
          if (!btn) return;
          e.preventDefault();
          e.stopPropagation();
          setMode(compare, btn.getAttribute("data-mode"));
        });

        compare.appendChild(imgBefore);
        compare.appendChild(imgAfter);
        compare.appendChild(toggle);

        const cap = document.createElement("figcaption");
        cap.innerHTML = item.title + "<span>" + item.style + "</span>";

        card.appendChild(compare);
        card.appendChild(cap);
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
